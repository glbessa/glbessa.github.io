
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz aniversário Karol</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Configurações básicas */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
            touch-action: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #mensagem {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 4rem;
            text-align: center;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4, 0 0 30px #ff69b4, 0 0 40px #ff1493, 0 0 50px #ff1493;
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            pointer-events: none;
            z-index: 10;
            width: 90%;
            line-height: 1.2;
        }

        #mensagem.revelado {
            opacity: 1;
        }

        /* --- Estilos da Gatinha Cartoon Refinada --- */
        #gatinha-container {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 130px; /* Ligeiramente maior para comportar os novos detalhes */
            height: 130px;
            z-index: 15;
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 1s ease-in;
            transform: translateX(-150px);
        }

        #gatinha-container.visivel {
            opacity: 1;
        }

        /* Controlo de visibilidade */
        #cat-walk {
            opacity: 1;
            transition: opacity 0.2s ease-out;
        }

        #cat-front {
            opacity: 0;
            transform-origin: 50% 85%; 
            transition: opacity 0.2s ease-in;
            display: none;
        }

        #gatinha-container.sitting #cat-walk {
            opacity: 0;
            display: none;
        }

        #gatinha-container.sitting #cat-front {
            display: block;
            opacity: 1;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Animação do Salto e Respiração */
        @keyframes popIn {
            0% { transform: scale(0.5) translateY(30px); }
            60% { transform: scale(1.05) translateY(-10px); }
            100% { transform: scale(1) translateY(0); }
        }

        .respirar {
            transform-origin: bottom center;
            animation: respiracao 2.5s infinite ease-in-out;
        }

        @keyframes respiracao {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.03) translateY(-1px); }
        }

        /* Animações da Caminhada (Perfil) */
        .corpo-animado { animation: bobbing 0.3s infinite alternate ease-in-out; transform-origin: center; }
        .perna-esq { transform-box: fill-box; transform-origin: top center; animation: walkEsq 0.4s infinite alternate ease-in-out; }
        .perna-dir { transform-box: fill-box; transform-origin: top center; animation: walkDir 0.4s infinite alternate ease-in-out; }
        .rabo-andando { transform-box: fill-box; transform-origin: bottom right; animation: balancar-rabo 1.2s infinite ease-in-out; }
        
        /* Animações Frontais (Sentada) */
        .olho-piscando { transform-box: fill-box; transform-origin: center; animation: piscar 4s infinite; }
        .rabo-frente { transform-box: fill-box; transform-origin: bottom left; animation: rabo-feliz 3s infinite ease-in-out; }
        .orelha-esq { transform-box: fill-box; transform-origin: bottom right; animation: twitch 5s infinite; }
        .orelha-dir { transform-box: fill-box; transform-origin: bottom left; animation: twitch 6s infinite; }

        @keyframes bobbing { 0% { transform: translateY(0px); } 100% { transform: translateY(4px); } }
        @keyframes walkEsq { 0% { transform: rotate(-35deg); } 100% { transform: rotate(35deg); } }
        @keyframes walkDir { 0% { transform: rotate(35deg); } 100% { transform: rotate(-35deg); } }
        @keyframes balancar-rabo { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } }
        @keyframes piscar { 0%, 46%, 48%, 100% { transform: scaleY(1); } 47% { transform: scaleY(0.1); } }
        @keyframes rabo-feliz { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-8deg); } }
        @keyframes twitch { 0%, 94%, 98%, 100% { transform: rotate(0deg); } 96% { transform: rotate(-12deg); } }

        @media (max-width: 600px) {
            #mensagem { font-size: 2.8rem; top: 30%; } 
            #gatinha-container { width: 110px; height: 110px; bottom: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="mensagem">Feliz aniversário Karol!</div>
    
    <div id="gatinha-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <!-- Brilho ligeiramente mais suave e refinado -->
            <defs>
                <filter id="brilho" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="rgba(255, 255, 255, 0.45)"/>
                </filter>
            </defs>
            
            <!-- ========================================== -->
            <!-- ESTADO 1: GATINHA A ANDAR (PERFIL)         -->
            <!-- ========================================== -->
            <g id="cat-walk" filter="url(#brilho)" class="corpo-animado">
                <!-- Rabo curvilíneo -->
                <path class="rabo-andando" d="M 20 45 C 5 40 0 15 15 10" fill="none" stroke="#151515" stroke-width="9" stroke-linecap="round"/>
                
                <!-- Pernas de Trás (Fundo) com dedinhos curvos -->
                <g class="perna-dir"><path d="M 32 60 L 30 82 Q 30 85 34 85" fill="none" stroke="#0f0f0f" stroke-width="8" stroke-linecap="round"/></g>
                <g class="perna-esq"><path d="M 62 60 L 60 82 Q 60 85 64 85" fill="none" stroke="#0f0f0f" stroke-width="8" stroke-linecap="round"/></g>
                
                <!-- Corpo Feijãozinho Refinado -->
                <rect x="20" y="42" width="50" height="30" rx="15" fill="#151515" />
                
                <!-- Pernas da Frente com peito do pé -->
                <g class="perna-esq"><path d="M 42 60 L 40 82 Q 40 85 44 85" fill="none" stroke="#151515" stroke-width="8" stroke-linecap="round"/></g>
                <g class="perna-dir"><path d="M 72 60 L 70 82 Q 70 85 74 85" fill="none" stroke="#151515" stroke-width="8" stroke-linecap="round"/></g>
                
                <!-- Cabeça -->
                <circle cx="72" cy="38" r="21" fill="#151515" />
                
                <!-- Orelhas pontiagudas e fofas -->
                <path d="M 58 24 L 64 10 L 72 20 Z" fill="#151515" stroke-linejoin="round"/>
                <path d="M 61 21 L 65 14 L 69 20 Z" fill="#ffb6c1" />
                <path d="M 70 20 L 78 8 L 84 22 Z" fill="#151515" stroke-linejoin="round"/>
                <path d="M 73 20 L 78 12 L 81 21 Z" fill="#ffb6c1" />
                
                <!-- Olho Preto com Reflexos -->
                <g class="olho-piscando">
                    <ellipse cx="80" cy="36" rx="6" ry="9.5" fill="white" /> 
                    <ellipse cx="81" cy="36" rx="4.5" ry="8" fill="#000" /> 
                    <circle cx="80" cy="32" r="2" fill="white" /> 
                    <circle cx="82.5" cy="39" r="1" fill="white" /> 
                </g>
                
                <!-- Focinho Saliente e Bochecha -->
                <circle cx="68" cy="45" r="4.5" fill="#ff69b4" opacity="0.6"/>
                <ellipse cx="92" cy="42" rx="3" ry="2.5" fill="#ffb6c1" />
                <path d="M 91 43 Q 93 45 91 47" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
                
                <!-- Coleira e Guizo -->
                <path d="M 58 52 L 72 58" fill="none" stroke="#ff1493" stroke-width="3.5" stroke-linecap="round"/>
                <circle cx="68" cy="60" r="4" fill="#ffd700" />
            </g>

            <!-- ========================================== -->
            <!-- ESTADO 2: GATINHA SENTADA (DE FRENTE)      -->
            <!-- ========================================== -->
            <g id="cat-front" filter="url(#brilho)">
                <!-- Rabo que passa por trás e abraça o corpo -->
                <path class="rabo-frente" d="M 30 82 C 10 85 5 60 18 45" fill="none" stroke="#151515" stroke-width="10" stroke-linecap="round"/>
                
                <g class="respirar">
                    <!-- Ancas (Coxas) visíveis ao sentar -->
                    <path d="M 32 60 C 15 65 15 85 28 85" fill="#151515" />
                    <path d="M 68 60 C 85 65 85 85 72 85" fill="#151515" />
                    
                    <!-- Corpo Central -->
                    <path d="M 32 85 C 32 55 68 55 68 85 Z" fill="#151515" />
                    
                    <!-- Patinhas da frente detalhadas com dedinhos -->
                    <rect x="38" y="76" width="10" height="11" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
                    <path d="M 41 82 L 41 87 M 45 82 L 45 87" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                    
                    <rect x="52" y="76" width="10" height="11" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
                    <path d="M 55 82 L 55 87 M 59 82 L 59 87" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
                    
                    <!-- Cabeça Formato Gato (mais larga nas bochechas) -->
                    <path d="M 25 42 C 25 22 75 22 75 42 C 75 60 65 68 50 68 C 35 68 25 60 25 42 Z" fill="#151515"/>
                    
                    <!-- Orelhas Animadas -->
                    <g class="orelha-esq">
                        <path d="M 28 35 L 22 12 L 42 22 Z" fill="#151515" stroke-linejoin="round"/>
                        <path d="M 30 30 L 26 16.5 L 38 23.5 Z" fill="#ffb6c1" />
                    </g>
                    <g class="orelha-dir">
                        <path d="M 72 35 L 78 12 L 58 22 Z" fill="#151515" stroke-linejoin="round"/>
                        <path d="M 70 30 L 74 16.5 L 62 23.5 Z" fill="#ffb6c1" />
                    </g>
                    
                    <!-- Olhos Gigantes, Pretos e Expressivos -->
                    <g class="olho-piscando">
                        <!-- Esquerdo -->
                        <ellipse cx="37" cy="45" rx="8" ry="12.5" fill="white" />
                        <ellipse cx="37" cy="45" rx="6.5" ry="10.5" fill="#000" />
                        <circle cx="34" cy="39" r="3" fill="white" />
                        <circle cx="39" cy="50" r="1.5" fill="white" />
                        <!-- Direito -->
                        <ellipse cx="63" cy="45" rx="8" ry="12.5" fill="white" />
                        <ellipse cx="63" cy="45" rx="6.5" ry="10.5" fill="#000" />
                        <circle cx="60" cy="39" r="3" fill="white" />
                        <circle cx="65" cy="50" r="1.5" fill="white" />
                    </g>
                    
                    <!-- Bochechas Coradas -->
                    <circle cx="28" cy="54" r="5.5" fill="#ff69b4" opacity="0.6"/>
                    <circle cx="72" cy="54" r="5.5" fill="#ff69b4" opacity="0.6"/>
                    
                    <!-- Focinho em Relevo (Fundo cinzento escuro e boca em 'W') -->
                    <ellipse cx="50" cy="56" rx="8" ry="5.5" fill="#222" /> 
                    <polygon points="48,53 52,53 50,55.5" fill="#ffb6c1" />
                    <path d="M 45.5 57 Q 47.7 59.5 50 57 Q 52.3 59.5 54.5 57" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
                    
                    <!-- Coleira e Guizo com corte -->
                    <path d="M 33 65 C 43 72 57 72 67 65" fill="none" stroke="#ff1493" stroke-width="4.5" stroke-linecap="round"/>
                    <circle cx="50" cy="71" r="5.5" fill="#ffd700" />
                    <line x1="50" y1="68" x2="50" y2="73" stroke="#d4af37" stroke-width="1.5"/> <!-- Ranhura do guizo -->
                </g>
            </g>
        </svg>
    </div>

    <script>
        // Configurações e Variáveis
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mensagem = document.getElementById('mensagem');
        const gatinhaContainer = document.getElementById('gatinha-container');
        
        let cw = window.innerWidth;
        let ch = window.innerHeight;
        canvas.width = cw;
        canvas.height = ch;

        let fireworks = [];
        let particles = [];
        let hue = 120; 
        let timerTotal = 70; 
        let timerTick = 0;
        let estadoJogo = 'esperando'; 

        // Lógica da Gatinha
        let estadoGatinha = 'escondida'; 
        let gatinhaX = -150; 
        let gatinhaVelocidade = cw < 600 ? 1.2 : 2;

        window.addEventListener('resize', () => {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvas.width = cw;
            canvas.height = ch;
            gatinhaVelocidade = cw < 600 ? 1.2 : 2;
        });

        function random(min, max) { return Math.random() * (max - min) + min; }
        function calcularDistancia(p1x, p1y, p2x, p2y) {
            return Math.sqrt(Math.pow(p1x - p2x, 2) + Math.pow(p1y - p2y, 2));
        }

        // --- Sistema de Fogos ---
        class Foguete {
            constructor(sx, sy, tx, ty, isSpecial = false) {
                this.x = sx; this.y = sy;
                this.sx = sx; this.sy = sy;
                this.tx = tx; this.ty = ty;
                this.isSpecial = isSpecial;
                this.distanciaTotal = calcularDistancia(sx, sy, tx, ty);
                this.distanciaViajada = 0;
                this.coordenadas = [];
                for (let i = 0; i < 3; i++) this.coordenadas.push([this.x, this.y]);
                this.angulo = Math.atan2(ty - sy, tx - sx);
                this.velocidade = 2;
                this.aceleracao = 1.05;
                this.brilho = random(50, 70);
            }

            atualizar(index) {
                this.coordenadas.pop();
                this.coordenadas.unshift([this.x, this.y]);
                this.velocidade *= this.aceleracao;

                let vx = Math.cos(this.angulo) * this.velocidade;
                let vy = Math.sin(this.angulo) * this.velocidade;
                this.distanciaViajada = calcularDistancia(this.sx, this.sy, this.x + vx, this.y + vy);

                if (this.distanciaViajada >= this.distanciaTotal) {
                    criarParticulas(this.tx, this.ty, this.isSpecial);
                    
                    if (this.isSpecial && estadoJogo === 'primeiro_foguete') {
                        mensagem.classList.add('revelado');
                        gatinhaContainer.classList.add('visivel');
                        estadoGatinha = 'andando'; 
                        estadoJogo = 'revelado';
                    }
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx;
                    this.y += vy;
                }
            }

            desenhar() {
                ctx.beginPath();
                ctx.moveTo(this.coordenadas[this.coordenadas.length - 1][0], this.coordenadas[this.coordenadas.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                let cor = this.isSpecial ? `hsl(330, 100%, ${this.brilho}%)` : `hsl(${hue}, 100%, ${this.brilho}%)`;
                ctx.strokeStyle = cor;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
        }

        class Particula {
            constructor(x, y, isSpecial) {
                this.x = x; this.y = y;
                this.coordenadas = [];
                for (let i = 0; i < 5; i++) this.coordenadas.push([this.x, this.y]);
                this.angulo = random(0, Math.PI * 2);
                this.velocidade = random(1, 10);
                this.friccao = 0.95;
                this.gravidade = 1;
                this.hue = isSpecial ? random(310, 350) : random(hue - 20, hue + 20);
                this.brilho = random(50, 80);
                this.alpha = 1;
                this.decaimento = random(0.015, 0.03);
            }

            atualizar(index) {
                this.coordenadas.pop();
                this.coordenadas.unshift([this.x, this.y]);
                this.velocidade *= this.friccao;
                this.x += Math.cos(this.angulo) * this.velocidade;
                this.y += Math.sin(this.angulo) * this.velocidade + this.gravidade;
                this.alpha -= this.decaimento;
                if (this.alpha <= this.decaimento) particles.splice(index, 1);
            }

            desenhar() {
                ctx.beginPath();
                ctx.moveTo(this.coordenadas[this.coordenadas.length - 1][0], this.coordenadas[this.coordenadas.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, ${this.brilho}%, ${this.alpha})`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
        }

        function criarParticulas(x, y, isSpecial) {
            let contagem = isSpecial ? 150 : 80;
            for (let i = 0; i < contagem; i++) particles.push(new Particula(x, y, isSpecial));
        }

        function atualizarGatinha() {
            if (estadoGatinha === 'escondida' || estadoGatinha === 'sentada') return;

            if (estadoGatinha === 'andando') {
                gatinhaX += gatinhaVelocidade;
                gatinhaContainer.style.transform = `translateX(${gatinhaX}px)`;

                const larguraGatinha = gatinhaContainer.getBoundingClientRect().width || 130;
                const alvoCentro = (cw / 2) - (larguraGatinha / 2);

                if (gatinhaX >= alvoCentro) {
                    gatinhaX = alvoCentro; 
                    gatinhaContainer.style.transform = `translateX(${gatinhaX}px)`;
                    estadoGatinha = 'sentada';
                    gatinhaContainer.classList.add('sitting');
                }
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, cw, ch);
            ctx.globalCompositeOperation = 'lighter';

            hue += 0.5;

            let i = fireworks.length;
            while (i--) {
                fireworks[i].desenhar();
                fireworks[i].atualizar(i);
            }
            let j = particles.length;
            while (j--) {
                particles[j].desenhar();
                particles[j].atualizar(j);
            }

            atualizarGatinha();

            if (estadoJogo === 'esperando') {
                setTimeout(() => {
                    if (estadoJogo === 'esperando') {
                        fireworks.push(new Foguete(cw / 2, ch, cw / 2, ch / 2 - 50, true));
                        estadoJogo = 'primeiro_foguete';
                    }
                }, 1000);
            } else if (estadoJogo === 'revelado') {
                if (timerTick >= timerTotal) {
                    let startX = random(cw * 0.1, cw * 0.9);
                    let targetX = startX + random(-50, 50);
                    let targetY = random(ch * 0.1, ch * 0.6);
                    fireworks.push(new Foguete(startX, ch, targetX, targetY, false));
                    timerTick = 0;
                    if (timerTotal > 20) timerTotal -= 1;
                } else {
                    timerTick++;
                }
            }
        }

        canvas.addEventListener('mousedown', function(e) {
            if(estadoJogo === 'revelado') {
                e.preventDefault();
                fireworks.push(new Foguete(cw / 2, ch, e.pageX, e.pageY, false));
            }
        });

        canvas.addEventListener('touchstart', function(e) {
            if(estadoJogo === 'revelado') {
                e.preventDefault();
                fireworks.push(new Foguete(cw / 2, ch, e.touches[0].pageX, e.touches[0].pageY, false));
            }
        });

        window.onload = loop;

    </script>
</body>
</html>
